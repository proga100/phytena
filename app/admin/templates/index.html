<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phytena Admin · AI Agronomy Assistant</title>
    <style>
      :root {
        --bg-color: #f5f5f7;
        --panel-bg: rgba(255, 255, 255, 0.8);
        --accent-color: #0071e3;
        --text-primary: #1d1d1f;
        --text-secondary: #86868b;
        --border-color: #d2d2d7;
        --radius: 12px;
      }

      body {
        font-family: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }

      main {
        max-width: 800px;
        margin: 0 auto;
        padding: 60px 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 40px;
        font-weight: 600;
        letter-spacing: -0.015em;
        margin: 0;
      }

      .header p {
        font-size: 19px;
        color: var(--text-secondary);
        margin-top: 8px;
      }

      .card {
        background: var(--panel-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 32px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
      }

      .form-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-primary);
      }

      textarea, input[type="text"] {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 16px;
        font-family: inherit;
        background: rgba(255, 255, 255, 0.5);
        transition: border-color 0.2s ease;
        box-sizing: border-box;
      }

      textarea:focus, input[type="text"]:focus {
        outline: none;
        border-color: var(--accent-color);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .upload-area {
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease;
        margin-bottom: 24px;
      }

      .upload-area:hover {
        background: rgba(0, 113, 227, 0.05);
        border-color: var(--accent-color);
      }

      .upload-area p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 14px;
      }

      .upload-area .icon {
        font-size: 32px;
        margin-bottom: 12px;
        display: block;
      }

      #image-preview {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin-top: 16px;
        display: none;
      }

      button {
        display: block;
        width: 100%;
        padding: 16px;
        background-color: var(--accent-color);
        color: white;
        border: none;
        border-radius: var(--radius);
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      button:hover {
        opacity: 0.9;
      }

      .footer {
        margin-top: 40px;
        text-align: center;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .footer a {
        color: var(--accent-color);
        text-decoration: none;
        margin: 0 8px;
      }

      input[type="file"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <h1>Phytena</h1>
        <p>AI Agronomy Research Playground</p>
      </div>

      <section class="card">
        <form method="post" action="/admin/comparisons" enctype="multipart/form-data">
          <div class="form-group">
            <label for="question">What is happening with the plant?</label>
            <textarea id="question" name="question" rows="4" required placeholder="Describe symptoms in Russian or Uzbek...">Пшеница желтеет, нижние листья сохнут, что делать?</textarea>
          </div>

          <div class="form-group">
            <label>Photo (optional)</label>
            <div class="upload-area" onclick="document.getElementById('image').click()">
              <span class="icon">📸</span>
              <p>Click to upload or drag and drop a photo</p>
              <input type="file" id="image" name="image" accept="image/*" onchange="previewImage(this)">
              <img id="image-preview" src="#" alt="Preview">
            </div>
          </div>

          <div class="grid">
            <div class="form-group">
              <label for="crop">Crop</label>
              <input type="text" id="crop" name="crop" value="пшеница" placeholder="e.g. wheat, tomato">
            </div>
            <div class="form-group">
              <label for="region">Region</label>
              <input type="text" id="region" name="region" value="Узбекистан" placeholder="e.g. Tashkent">
            </div>
          </div>

          <button type="submit">Run Comparison</button>
        </form>
      </section>

      <div class="footer">
        <a href="/healthz">Health</a> · 
        <a href="/readyz">Readiness</a> · 
        <a href="/v1/system">System Info</a>
      </div>
    </main>

    <script>
      function previewImage(input) {
        const preview = document.getElementById('image-preview');
        const uploadText = document.querySelector('.upload-area p');
        const icon = document.querySelector('.upload-area .icon');
        
        if (input.files && input.files[0]) {
          const reader = new FileReader();
          reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
            uploadText.innerText = input.files[0].name;
            icon.style.display = 'none';
          }
          reader.readAsDataURL(input.files[0]);
        }
      }
    </script>
  </body>
</html>
